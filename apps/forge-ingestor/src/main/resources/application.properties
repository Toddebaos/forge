# Server
server.port=8080

# GitHub
github.token=${GITHUB_TOKEN}
github.username=${GITHUB_USERNAME}
# Polling-intervall i millisekunder — var 15:e minut
github.poll.interval=900000

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://forge-postgres-rw.todde.svc.cluster.local:5432/forge}
spring.datasource.username=${POSTGRES_USER:forge}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Ta bort timescale-specifik datasource och peka på PostgreSQL
timescale.datasource.url=${POSTGRES_URL:jdbc:postgresql://forge-postgres-rw.todde.svc.cluster.local:5432/forge}
timescale.datasource.username=${POSTGRES_USER:forge}
timescale.datasource.password=${POSTGRES_PASSWORD}
timescale.enabled=true

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://forge-mongodb.todde.svc.cluster.local:27017/forge_events}

# Redis
spring.data.redis.host=${REDIS_HOST:forge-redis-master.todde.svc.cluster.local}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}

# Elasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://forge-elasticsearch.todde.svc.cluster.local:9200}
spring.elasticsearch.username=elastic
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Flyway — kör migrationer automatiskt vid uppstart
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
