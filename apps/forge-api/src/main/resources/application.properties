server.port=8080

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://forge-postgres-rw.todde.svc.cluster.local:5432/forge}
spring.datasource.username=${POSTGRES_USER:forge}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://forge-mongodb.todde.svc.cluster.local:27017/forge_events}

# Redis — används för caching
spring.data.redis.host=${REDIS_HOST:forge-redis-master.todde.svc.cluster.local}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}

# Elasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://forge-elasticsearch.todde.svc.cluster.local:9200}
spring.elasticsearch.username=elastic
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD}

# Cache TTL — hur länge repo-data cachas i Redis
cache.repos.ttl=300

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Flyway
spring.flyway.enabled=false
# API:et kör inga migrationer — det är ingestorns ansvar