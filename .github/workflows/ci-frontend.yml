name: CI — forge-frontend

on:
  push:
    paths:
      - 'apps/forge-frontend/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Sätt upp Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/forge-frontend/package-lock.json

      - name: Installera dependencies
        working-directory: apps/forge-frontend
        run: npm ci

      - name: Bygg Next.js
        working-directory: apps/forge-frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.toddemanos.com
        run: npm run build

      - name: Logga in på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sätt lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Bygg och pusha Docker-image
        uses: docker/build-push-action@v5
        with:
          context: apps/forge-frontend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/forge-frontend:latest
            ghcr.io/${{ env.OWNER }}/forge-frontend:${{ github.sha }}

      - name: Uppdatera image-tag i deployment
        run: |
          sed -i "s|ghcr.io/toddebaos/forge-api:.*|ghcr.io/toddebaos/forge-api:${{ github.sha }}|" \
          infra/base/apps/forge-frontend/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add infra/base/apps/forge-frontend/deployment.yaml
          git commit -m "ci: update forge-frontend image to ${{ github.sha }}"
          git push origin main
