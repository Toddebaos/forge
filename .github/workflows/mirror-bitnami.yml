name: Mirror Bitnami images to GHCR

on:
  workflow_dispatch:  # kör manuellt från GitHub UI

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Logga in på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Installera Helm
        uses: azure/setup-helm@v4

      - name: Lägg till Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update

      - name: Hämta image-taggar från charts
        id: tags
        run: |
          MONGODB_TAG=$(helm show values bitnami/mongodb --version 15.6.0 | grep -A3 "^image:" | grep "tag:" | head -1 | awk '{print $2}')
          REDIS_TAG=$(helm show values bitnami/redis --version 19.6.4 | grep -A3 "^image:" | grep "tag:" | head -1 | awk '{print $2}')
          ES_TAG=$(helm show values bitnami/elasticsearch --version 21.3.0 | grep -A3 "^image:" | grep "tag:" | head -1 | awk '{print $2}')
          echo "mongodb=$MONGODB_TAG" >> $GITHUB_OUTPUT
          echo "redis=$REDIS_TAG" >> $GITHUB_OUTPUT
          echo "elasticsearch=$ES_TAG" >> $GITHUB_OUTPUT
          echo "MongoDB: $MONGODB_TAG, Redis: $REDIS_TAG, Elasticsearch: $ES_TAG"

      - name: Spegla MongoDB
        run: |
          docker pull docker.io/bitnami/mongodb:7.0
          docker tag docker.io/bitnami/mongodb:7.0 ghcr.io/toddebaos/bitnami-mongodb:7.0
          docker push ghcr.io/toddebaos/bitnami-mongodb:7.0

      - name: Spegla Redis
        run: |
          docker pull docker.io/bitnami/redis:7.2
          docker tag docker.io/bitnami/redis:7.2 ghcr.io/toddebaos/bitnami-redis:7.2
          docker push ghcr.io/toddebaos/bitnami-redis:7.2

      - name: Spegla Elasticsearch
        run: |
          docker pull docker.io/bitnami/elasticsearch:8
          docker tag docker.io/bitnami/elasticsearch:8 ghcr.io/toddebaos/bitnami-elasticsearch:8
          docker push ghcr.io/toddebaos/bitnami-elasticsearch:8

      - name: Sammanfattning
        run: |
          echo "### Speglade images" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/toddebaos/bitnami-mongodb:7.0" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/toddebaos/bitnami-redis:7.2" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/toddebaos/bitnami-elasticsearch:8" >> $GITHUB_STEP_SUMMARY
