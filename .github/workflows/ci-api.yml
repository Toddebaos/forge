name: CI — forge-api

on:
  push:
    paths:
      - 'apps/forge-api/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Sätt upp Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Gör mvnw körbar
        run: chmod +x apps/forge-api/mvnw

      - name: Bygg
        working-directory: apps/forge-api
        run: ./mvnw package -DskipTests

      - name: Logga in på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sätt lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Bygg och pusha Docker-image
        uses: docker/build-push-action@v5
        with:
          context: apps/forge-api
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/forge-api:latest
            ghcr.io/${{ env.OWNER }}/forge-api:${{ github.sha }}

      - name: Uppdatera image-tag i deployment
        run: |
          sed -i "s|ghcr.io/toddebaos/forge-api:.*|ghcr.io/toddebaos/forge-api:${{ github.sha }}|" \
          infra/base/apps/forge-api/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add infra/base/apps/forge-api/deployment.yaml
          git commit -m "ci: update forge-api image to ${{ github.sha }}"
          git push
