name: CI — forge-ingestor

on:
  push:
    paths:
      - 'apps/forge-ingestor/**'
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Sätt upp Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Kör tester
        working-directory: apps/forge-ingestor
        run: ./mvnw test

      - name: Logga in på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Konverterar användarnamnet till lowercase — GHCR kräver det
      - name: Sätt lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Bygg och pusha Docker-image
        uses: docker/build-push-action@v5
        with:
          context: apps/forge-ingestor
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/forge-ingestor:latest
            ghcr.io/${{ env.OWNER }}/forge-ingestor:${{ github.sha }}

      - name: Uppdatera image-tagg i manifest
        run: |
          sed -i "s|forge-ingestor:.*|forge-ingestor:${{ github.sha }}|" \
            infra/base/apps/forge-ingestor/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add infra/base/apps/forge-ingestor/deployment.yaml
          git commit -m "ci: update forge-ingestor image to ${{ github.sha }}"
          git push origin main