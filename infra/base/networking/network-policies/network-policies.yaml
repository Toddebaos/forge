# Default: blockera all ingress och egress i todde namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: todde
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# NGINX får ta emot trafik utifrån och nå alla pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: todde
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}
---
# forge-api får ta emot från NGINX och nå postgres, redis, elasticsearch, mongodb
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-forge-api
  namespace: todde
spec:
  podSelector:
    matchLabels:
      app: forge-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: forge-postgres
  - to:
    - podSelector:
        matchLabels:
          app: forge-redis
  - to:
    - podSelector:
        matchLabels:
          app: forge-elasticsearch
  - to:
    - podSelector:
        matchLabels:
          app: forge-mongodb
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# forge-ingestor får nå github (egress internet) och databaser
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-forge-ingestor
  namespace: todde
spec:
  podSelector:
    matchLabels:
      app: forge-ingestor
  policyTypes:
  - Ingress
  - Egress
  egress:
  - {}
---
# forge-frontend får ta emot från NGINX
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-forge-frontend
  namespace: todde
spec:
  podSelector:
    matchLabels:
      app: forge-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
  egress:
  - ports:
    - port: 53
      protocol: UDP
---
# cloudflared får nå NGINX
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared
  namespace: todde
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
  - Ingress
  - Egress
  egress:
  - {}