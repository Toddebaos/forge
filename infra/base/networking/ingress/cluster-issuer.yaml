apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: din@email.com  # byt ut — Let's Encrypt skickar varningar hit
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          # DNS-01 challenge via Cloudflare — bevisar domänägande utan öppna portar
          cloudflare:
            email: din@email.com  # byt ut
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token