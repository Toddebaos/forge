apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forge-frontend
  namespace: todde
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - toddemanos.com
      secretName: forge-frontend-tls
  rules:
    - host: toddemanos.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forge-frontend
                port:
                  number: 80
