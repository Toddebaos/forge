apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-frontend
  namespace: todde
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forge-frontend
  template:
    metadata:
      labels:
        app: forge-frontend
    spec:
      containers:
        - name: forge-frontend
          image: ghcr.io/toddebaos/forge-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
