apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-api
  namespace: todde
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forge-api
  template:
    metadata:
      labels:
        app: forge-api
    spec:
      containers:
        - name: forge-api
          image: ghcr.io/toddebaos/forge-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-postgres-credentials
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-redis-credentials
                  key: password
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-elasticsearch-credentials
                  key: password
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: forge-api-secrets
                  key: mongodb-uri
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: none
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: forge-api
  namespace: todde
spec:
  selector:
    app: forge-api
  ports:
    - port: 80
      targetPort: 8080
