apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-ingestor
  namespace: todde
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forge-ingestor
  template:
    metadata:
      labels:
        app: forge-ingestor
    spec:
      containers:
        - name: forge-ingestor
          image: ghcr.io/toddebaos/forge-ingestor:bf11deab00b5d003c01981f1477d040c75e4fdcb
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx768m"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forge-ingestor-secrets
                  key: github-token
            - name: GITHUB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: forge-ingestor-secrets
                  key: github-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-postgres-credentials
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-redis-credentials
                  key: password
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-elasticsearch-credentials
                  key: password
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: forge-ingestor-secrets
                  key: mongodb-uri
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 10