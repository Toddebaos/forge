apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forge-elasticsearch
  namespace: todde
spec:
  serviceName: forge-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: forge-elasticsearch
  template:
    metadata:
      labels:
        app: forge-elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
          ports:
            - containerPort: 9200
            - containerPort: 9300
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "true"
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-elasticsearch-credentials
                  key: password
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              cpu: 100m
              memory: 768Mi
            limits:
              cpu: 300m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: forge-elasticsearch
  namespace: todde
spec:
  selector:
    app: forge-elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
