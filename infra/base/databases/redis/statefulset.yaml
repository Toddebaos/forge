apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forge-redis
  namespace: todde
spec:
  serviceName: forge-redis
  replicas: 1
  selector:
    matchLabels:
      app: forge-redis
  template:
    metadata:
      labels:
        app: forge-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-redis-credentials
                  key: password
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: forge-redis-master
  namespace: todde
spec:
  selector:
    app: forge-redis
  ports:
    - port: 6379
      targetPort: 6379
