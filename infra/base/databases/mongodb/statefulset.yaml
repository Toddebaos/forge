apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forge-mongodb
  namespace: todde
spec:
  serviceName: forge-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: forge-mongodb
  template:
    metadata:
      labels:
        app: forge-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forge-mongodb-credentials
                  key: mongodb-root-password
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: forge-mongodb
  namespace: todde
spec:
  selector:
    app: forge-mongodb
  ports:
    - port: 27017
      targetPort: 27017
