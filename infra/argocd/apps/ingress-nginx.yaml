apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: todde
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.10.1
    helm:
      valuesObject:
        controller:
          # DaemonSet istället för Deployment — kör en pod per nod
          # säkerställer att ingress alltid är tillgänglig oavsett nod
          kind: DaemonSet

          # Vi använder Cloudflare Tunnel — ingen extern LoadBalancer behövs
          # ClusterIP räcker, cloudflared når NGINX internt
          service:
            type: ClusterIP

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi

          # Loggar real IP från Cloudflare istället för tunnel-IP
          config:
            use-forwarded-headers: "true"
            compute-full-forwarded-for: "true"
            use-proxy-protocol: "false"
    destination:
      server: https://kubernetes.default.svc
      namespace: todde