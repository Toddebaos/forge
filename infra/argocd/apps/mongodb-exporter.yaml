apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-exporter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Toddebaos/forge.git
    path: infra/base/monitoring/mongodb-exporter
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true