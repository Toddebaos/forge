apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Toddebaos/forge.git
    targetRevision: main
    path: infra/base/databases/mongodb
  destination:
    server: https://kubernetes.default.svc
    namespace: todde
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
